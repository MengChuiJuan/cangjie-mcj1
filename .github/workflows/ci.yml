name: CI for String Utils

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装仓颉环境
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: lts   # 使用 LTS 通道

      - name: 验证工具链
        run: |
          cjc --version
          cjpm --version

      - name: 构建项目
        run: cjpm build --verbose

      - name: 运行单元测试
        run: cjpm test --verbose

      - name: 输出完成信息
        run: echo "✅ CI 流程成功完成！"
