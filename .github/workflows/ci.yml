name: 仓颉CI/CD自动化测试
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: 构建与单元测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./code
    steps:
      # 检出代码，强制放到单层code文件夹，消除双层嵌套
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          path: ./code

      # 安装仓颉环境（自动进入单层code目录）
      - name: 安装仓颉编程语言环境
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: LTS

      - name: 验证仓颉工具链
        run: |
          cjc --version
          cjpm --version

      - name: 构建仓颉项目
        run: cjpm build --verbose

      - name: 运行仓颉单元测试
        run: |
          echo "===开始运行单元测试==="
          cjpm test --verbose
